name: Build 1.21.11

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build mod
        env:
          GRADLE_OPTS: -Dorg.gradle.java.home=${{ env.JAVA_HOME }}
        run: ./gradlew build

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: playerbatch-1.21.11
          path: build/libs/playerbatch-*-mc1.21.11.jar
          if-no-files-found: error

      - name: Publish latest 1.21.11 release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-1.21.11
          name: Latest 1.21.11 Build
          prerelease: true
          overwrite_files: true
          files: build/libs/playerbatch-*-mc1.21.11.jar
